<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة العراق المالية - iOS PWA</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ios-app-container">
    <!-- Top Sticky Header -->
    <header class="ios-header">
        <div class="header-top">
            <h1 class="app-title">بوابة العراق المالية</h1>
            <button class="icon-btn bell-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </button>
        </div>
        <div class="search-container" id="global-search-bar">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="search-input" placeholder="ابحث عن الوزارات، أسعار العملات، أو الذهب...">
        </div>
    </header>

    <!-- Main SPA Content Area -->
    <main class="ios-main-content">

        <!-- Section 1: Salaries (الرواتب الحكومية) -->
        <section id="sec-salaries" class="spa-section active">
            <div class="section-header">
                <h2 class="section-title">الرواتب الحكومية</h2>
                <div class="live-indicator">
                    <span class="pulse-dot"></span>
                    <span class="live-text">آخر التحديثات (مباشر)</span>
                </div>
            </div>
            <!-- Backend Data Container -->
            <div id="salaries-grid" class="cards-list">
                <!-- Data injected by app.js -->
            </div>
            
            <!-- Pagination Controls -->
            <div id="pagination-controls" class="ios-pagination"></div>
        </section>

        <!-- Section 2: Bourses (العملات والبورصة) -->
        <section id="sec-bourses" class="spa-section">
            <div class="section-header">
                <h2 class="section-title">العملات والبورصة</h2>
            </div>
            
            <!-- Local Bourses Container -->
            <div id="bourses-grid">
                <!-- Data injected by app.js -->
            </div>
        </section>

        <!-- Section 3: Metals & Oil (المعادن والنفط) -->
        <section id="sec-metals-oil" class="spa-section">
            <div class="section-header">
                <h2 class="section-title">المعادن والنفط</h2>
            </div>
            
            <!-- Segmented Control -->
            <div class="segmented-control">
                <input type="radio" id="seg-metals" name="metal-oil" checked>
                <label for="seg-metals">الذهب والفضة</label>
                
                <input type="radio" id="seg-oil" name="metal-oil">
                <label for="seg-oil">النفط</label>
            </div>

            <!-- Metals View -->
            <div id="metals-view" class="segmented-content active">
                <div id="metals-grid" class="grid-2col">
                    <!-- Data injected by app.js -->
                </div>
            </div>

            <!-- Oil View -->
            <div id="oil-view" class="segmented-content">
                <div id="oil-grid" class="grid-2col">
                    <!-- Data injected by app.js -->
                </div>
            </div>
        </section>

        <!-- Section 4: Converter (المحول المالي) -->
        <section id="sec-converter" class="spa-section">
            <div class="section-header">
                <h2 class="section-title">المحول المالي</h2>
            </div>
            <div class="ios-card converter-card">
                <div class="converter-row">
                    <input type="text" inputmode="decimal" id="from-amount" class="ios-input" value="100">
                    <div id="from-currency-btn" class="ios-select-btn interactive-btn" data-currency="USD">
                        <span class="currency-flag" id="from-flag">🇺🇸</span>
                        <span class="currency-code" id="from-code">USD</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>
                
                <div class="converter-swap">
                    <button id="swap-btn" class="icon-btn interactive-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="14" x2="21" y2="3"></line><polyline points="8 21 3 21 3 16"></polyline><line x1="20" y1="10" x2="3" y2="21"></line></svg>
                    </button>
                </div>
                
                <div class="converter-row">
                    <input type="text" readonly id="to-amount" class="ios-input result-input" value="131,500">
                    <div id="to-currency-btn" class="ios-select-btn interactive-btn" data-currency="IQD">
                        <span class="currency-flag" id="to-flag">🇮🇶</span>
                        <span class="currency-code" id="to-code">IQD</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>
                
                <div class="converter-note">
                    السعر المعتمد: السوق الموازي
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="ios-bottom-nav">
        <button class="nav-tab active" data-target="sec-salaries">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span class="nav-label">الرواتب</span>
        </button>
        <button class="nav-tab" data-target="sec-bourses">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span class="nav-label">العملات</span>
        </button>
        <button class="nav-tab" data-target="sec-metals-oil">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
            <span class="nav-label">المعادن</span>
        </button>
        <button class="nav-tab" data-target="sec-converter">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3v18"></path><path d="M3 17h18"></path><path d="M7 21L3 17l4-4"></path><path d="M17 7L21 3l4 4"></path></svg>
            <span class="nav-label">المحول</span>
        </button>
    </nav>
</div>

<!-- Currency Selector Bottom Sheet -->
<div id="currency-sheet-overlay" class="sheet-overlay"></div>
<div id="currency-sheet" class="bottom-sheet">
    <div class="sheet-header">
        <div class="sheet-handle"></div>
        <h3 class="sheet-title">اختر العملة</h3>
    </div>
    <div class="sheet-content" id="currency-list">
        <!-- Populated via JS -->
    </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
